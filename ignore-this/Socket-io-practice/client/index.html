<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Socket.io</title>

  
</head>
<body>
  <h1>
    Socket.io practicing
  </h1>

  <h2 id="user"></h2>


  <form id="form">


    <input type="text" id="message">
     <button id="btn">send</button>
  </form>


  <div id="socket">

  </div>

  <button onclick="MatchMaking()"> Start Match making</button>
  <div id="end"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let username = prompt("Enter Your name")
    var usersocketid = null

  

    var data = {name:username,status:'idle'}
    const usercontainer = document.getElementById('user')
    usercontainer.innerHTML = username
    const socketcontainer = document.getElementById('socket')
    const end = document.getElementById('end')
    
    const socket = io("http://localhost:5005");

    if(username!==null || username!=="")
  { 
        socket.emit("join", {name:username,status:'idle'});
  }

    


    socket.on('userdata',(i)=>{
        data = i
        console.log('now data is',data)
    })

     document.getElementById('form').addEventListener('submit',(e)=>{
         e.preventDefault();
    socket.emit('message',{
        name:username,
        message:document.getElementById('message').value,
        receiver:'ankit'
        
    })
    })

    socket.on('receivemessage',(message)=>{
        console.log('message received',message.message)
    })

    socket.on('roomcreated',(data)=>{
      console.log('match found!!',data)
      window.location.href = `Game.html?roomid=${data.roomid}&player1=${data.player1}&player2=${data.player2}`;


    })

    function MatchMaking()
    {
        data.status= 'matchmaking'
        socket.emit('matchmaking',data)
        usercontainer.innerHTML = "Finding opponent for you"

        
    }


  </script>
</body>
</html>
