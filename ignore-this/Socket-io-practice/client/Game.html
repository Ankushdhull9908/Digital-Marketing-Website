<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
</head>
<body>
    <h1 id="roomid"></h1>
    <h2 id="playername"></h2>
    <h3 id="playername2"></h2>
        <input type="text" id="msg">
        <button onclick="sendMessage()">Send</button>
</body>
 
<script>
    const socket = io("http://localhost:5005");
  const params = new URLSearchParams(window.location.search);
  const roomid = params.get("roomid");
  const player1 = params.get("player1")
  const player2 = params.get("player2")
  document.getElementById('roomid').innerHTML = roomid
  document.getElementById('playername').innerHTML = player1
  document.getElementById('playername2').innerHTML = player2


  function sendMessage()
  { 
    io.to(roomid).emit("gamemsg",{msg:"HI THIS IS MSG"}) 
  }

</script>
</html>
